# ?????????????????????????????????????????????
#  EduConnect ? QA Configuration
#  Profile: MySQL via Docker
#  Run: docker compose up --build
# ?????????????????????????????????????????????

# ?? MySQL Database ????????????????????????????
spring.datasource.url=jdbc:mysql://db:3306/educonnect?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=educonnect_user
spring.datasource.password=educonnect_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ?? JPA / Hibernate ??????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# ?? Seed data ?????????????????????????????????
spring.sql.init.mode=always

# ?? H2 Console disabled in QA ?????????????????
spring.h2.console.enabled=false

# ?? Thymeleaf ????????????????????????????????
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=true