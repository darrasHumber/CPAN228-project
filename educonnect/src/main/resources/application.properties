# ?????????????????????????????????????????????
#  EduConnect ? Default (Dev) Configuration
#  Profile: H2 in-memory database
#  Run: ./mvnw spring-boot:run
# ?????????????????????????????????????????????

spring.application.name=Thymeleaf-Demo

# ?? Active profile ????????????????????????????
spring.profiles.active=dev

# ?? H2 In-Memory Database ????????????????????
spring.datasource.name=educonnect
spring.datasource.url=jdbc:h2:mem:educonnect
spring.datasource.username=darras
spring.datasource.password=root

# H2 Console ? http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ?? JPA / Hibernate ??????????????????????????
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.defer-datasource-initialization=true

# ?? Seed data ?????????????????????????????????
spring.sql.init.mode=always

# ?? Thymeleaf ????????????????????????????????
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
