<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Login')}"></head>

<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">

      <!-- Success message (from registration redirect) -->
      <div th:if="${successMessage}"
           class="alert alert-success alert-dismissible fade show mb-3" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>

      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white text-center py-3">
          <h4 class="mb-0">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login
          </h4>
        </div>
        <div class="card-body p-4">

          <!-- Error message (wrong credentials) -->
          <div th:if="${param.error}"
               class="alert alert-danger d-flex align-items-center mb-3" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            Invalid username or password. Please try again.
          </div>

          <!-- Logout message -->
          <div th:if="${param.logout}"
               class="alert alert-info d-flex align-items-center mb-3" role="alert">
            <i class="bi bi-info-circle-fill me-2"></i>
            You have been logged out successfully.
          </div>

          <!-- Spring Security handles this POST automatically -->
          <form th:action="@{/login}" method="post">

            <!-- Username -->
            <div class="mb-3">
              <label for="username" class="form-label fw-semibold">Username</label>
              <input type="text" id="username" name="username"
                     class="form-control"
                     placeholder="Enter your username"
                     autofocus/>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Password</label>
              <input type="password" id="password" name="password"
                     class="form-control"
                     placeholder="Enter your password"/>
            </div>

            <!-- Submit -->
            <div class="d-grid mb-3">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Log In
              </button>
            </div>

            <!-- Register link -->
            <div class="text-center">
              <span class="text-muted">Don't have an account?</span>
              <a th:href="@{/register}" class="ms-1 fw-semibold">Register here</a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
