<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Register')}"></head>

<body class="bg-light">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">

            <!-- Flash success -->
            <div th:if="${successMessage}"
                 class="alert alert-success alert-dismissible fade show mb-3" role="alert">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">
                        <i class="bi bi-person-plus-fill me-2"></i>Create an Account
                    </h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/register}" th:object="${user}" method="post" novalidate>

                        <!-- First + Last Name -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="firstName" class="form-label fw-semibold">
                                    First Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="firstName"
                                       th:field="*{firstName}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'"
                                       placeholder="e.g. Ahmed"/>
                                <div class="invalid-feedback" th:errors="*{firstName}"></div>
                            </div>
                            <div class="col-md-6">
                                <label for="lastName" class="form-label fw-semibold">
                                    Last Name <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="lastName"
                                       th:field="*{lastName}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'"
                                       placeholder="e.g. Rahim"/>
                                <div class="invalid-feedback" th:errors="*{lastName}"></div>
                            </div>
                        </div>

                        <!-- Username -->
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold">
                                Username <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="username"
                                   th:field="*{username}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'"
                                   placeholder="e.g. ahmed123"/>
                            <div class="invalid-feedback" th:errors="*{username}"></div>
                            <div class="form-text">3–50 characters, must be unique</div>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold">
                                Email <span class="text-danger">*</span>
                            </label>
                            <input type="email" id="email"
                                   th:field="*{email}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                                   placeholder="e.g. ahmed@example.com"/>
                            <div class="invalid-feedback" th:errors="*{email}"></div>
                        </div>

                        <!-- Password -->
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold">
                                Password <span class="text-danger">*</span>
                            </label>
                            <input type="password" id="password"
                                   th:field="*{password}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'"
                                   placeholder="Minimum 6 characters"/>
                            <div class="invalid-feedback" th:errors="*{password}"></div>
                        </div>

                        <!-- Role dropdown -->
                        <div class="mb-4">
                            <label for="role" class="form-label fw-semibold">
                                I am joining as <span class="text-danger">*</span>
                            </label>
                            <select id="role"
                                    th:field="*{role}"
                                    class="form-select"
                                    th:classappend="${#fields.hasErrors('role')} ? 'is-invalid'">
                                <option value="">– Select your role –</option>
                                <option value="STUDENT">
                                    🎓 Student — I want to enroll in courses
                                </option>
                                <option value="INSTRUCTOR">
                                    👩‍🏫 Instructor — I want to teach courses
                                </option>
                            </select>
                            <div class="invalid-feedback" th:errors="*{role}"></div>
                            <div class="form-text">
                                Admins are created by the platform administrators only.
                            </div>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-person-check me-2"></i>Create Account
                            </button>
                        </div>

                        <!-- Login link -->
                        <div class="text-center">
                            <span class="text-muted">Already have an account?</span>
                            <a th:href="@{/login}" class="ms-1 fw-semibold">Log in</a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
