<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Courses')}"></head>

<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container">

    <!-- Page header -->
    <div class="page-header flex-between">
        <div>
            <h1>All Courses</h1>
            <p class="text-muted mt-1">
                Showing <span th:text="${courses.size()}">0</span> of
                <span th:text="${totalElements}">0</span> courses
                <span th:if="${totalPages > 1}">
          &nbsp;·&nbsp; Page
          <span th:text="${currentPage + 1}">1</span> of
          <span th:text="${totalPages}">1</span>
        </span>
            </p>
        </div>
        <a th:href="@{/courses/new}" class="btn btn-primary">+ Add Course</a>
    </div>

    <!-- Flash success -->
    <div th:if="${successMessage}" class="alert alert-success" data-auto-dismiss>
        <span th:text="${successMessage}"></span>
    </div>

    <!-- Search & Filter -->
    <div class="search-bar">
        <form th:action="@{/courses}" method="get">
            <div class="field field-grow">
                <label class="form-label" style="margin-bottom:4px">Search by Title</label>
                <input type="text" name="search" class="form-control"
                       placeholder="e.g. Python, Calculus…"
                       th:value="${search}"/>
            </div>
            <div class="field field-md">
                <label class="form-label" style="margin-bottom:4px">Category</label>
                <select name="category" class="form-select">
                    <option value="">All Categories</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.name()}"
                            th:text="${cat.name().charAt(0) + cat.name().substring(1).toLowerCase()}"
                            th:selected="${cat.name() == category}">
                    </option>
                </select>
            </div>
            <div class="field field-sm">
                <label class="form-label" style="margin-bottom:4px">Status</label>
                <select name="status" class="form-select">
                    <option value="">All Statuses</option>
                    <option th:each="st : ${statuses}"
                            th:value="${st.name()}"
                            th:text="${st.name().charAt(0) + st.name().substring(1).toLowerCase()}"
                            th:selected="${st.name() == status}">
                    </option>
                </select>
            </div>
            <input type="hidden" name="sort"      th:value="${sort}"/>
            <input type="hidden" name="direction" th:value="${direction}"/>
            <input type="hidden" name="size"      th:value="${pageSize}"/>
            <div class="actions">
                <button type="submit" class="btn btn-primary">Search</button>
                <a th:href="@{/courses}" class="btn btn-ghost">Clear</a>
            </div>
        </form>
    </div>

    <!-- Table -->
    <div class="table-wrap">
        <table>
            <thead>
            <tr>
                <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='courseCode',direction=${sort=='courseCode' and direction=='ASC'?'DESC':'ASC'})}" th:classappend="${sort=='courseCode'}?'active'">Code <span th:if="${sort=='courseCode'}" th:text="${direction=='ASC'?'↑':'↓'}"></span></a></th>
                <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='title',direction=${sort=='title' and direction=='ASC'?'DESC':'ASC'})}" th:classappend="${sort=='title'}?'active'">Title <span th:if="${sort=='title'}" th:text="${direction=='ASC'?'↑':'↓'}"></span></a></th>
                <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='category',direction=${sort=='category' and direction=='ASC'?'DESC':'ASC'})}" th:classappend="${sort=='category'}?'active'">Category <span th:if="${sort=='category'}" th:text="${direction=='ASC'?'↑':'↓'}"></span></a></th>
                <th>Instructor</th>
                <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='durationWeeks',direction=${sort=='durationWeeks' and direction=='ASC'?'DESC':'ASC'})}" th:classappend="${sort=='durationWeeks'}?'active'">Duration <span th:if="${sort=='durationWeeks'}" th:text="${direction=='ASC'?'↑':'↓'}"></span></a></th>
                <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='maxStudents',direction=${sort=='maxStudents' and direction=='ASC'?'DESC':'ASC'})}" th:classappend="${sort=='maxStudents'}?'active'">Seats <span th:if="${sort=='maxStudents'}" th:text="${direction=='ASC'?'↑':'↓'}"></span></a></th>
                <th>Status</th>
                <th style="text-align:center">Actions</th>
            </tr>
            </thead>
            <tbody>

            <!-- Empty state -->
            <tr th:if="${courses.empty}">
                <td colspan="8">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>No courses found. <a th:href="@{/courses/new}">Add the first one!</a></p>
                    </div>
                </td>
            </tr>

            <!-- Course rows -->
            <tr th:each="course : ${courses}">
                <td><span class="code-pill" th:text="${course.courseCode}">CODE</span></td>
                <td>
                    <a th:href="@{/courses/{id}(id=${course.courseId})}"
                       style="font-weight:600"
                       th:text="${course.title}">Title</a>
                </td>
                <td>
            <span class="badge"
                  th:classappend="${course.category.name() == 'MATHEMATICS'} ? 'badge-yellow' :
                                   (${course.category.name() == 'BUSINESS'}  ? 'badge-teal'  :
                                   (${course.category.name() == 'SCIENCE'}   ? 'badge-teal'  :
                                   (${course.category.name() == 'LANGUAGE'}  ? 'badge-gray'  :
                                   (${course.category.name() == 'ARTS'}      ? 'badge-red'   : 'badge-blue'))))"
                  th:text="${course.category.name().charAt(0) + course.category.name().substring(1).toLowerCase()}">
            </span>
                </td>
                <td class="text-muted" th:text="${course.instructorName}">Instructor</td>
                <td th:text="${course.durationWeeks + ' wks'}">12 wks</td>
                <td th:text="${course.maxStudents}">50</td>
                <td>
            <span class="badge"
                  th:classappend="${course.status.name() == 'ACTIVE'}    ? 'badge-success' :
                                   (${course.status.name() == 'DRAFT'}   ? 'badge-yellow'  : 'badge-gray')"
                  th:text="${course.status.name().charAt(0) + course.status.name().substring(1).toLowerCase()}">
            </span>
                </td>
                <td style="text-align:center">
                    <a th:href="@{/courses/{id}(id=${course.courseId})}"
                       class="btn btn-ghost btn-sm">View</a>
                </td>
            </tr>

            </tbody>
        </table>
    </div>

    <!-- Pagination -->
    <div th:if="${totalPages > 1}" class="pagination">
    <span th:classappend="${currentPage == 0} ? 'disabled'">
      <a th:if="${currentPage != 0}"
         th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort=${sort},direction=${direction})}">« First</a>
      <span th:if="${currentPage == 0}">« First</span>
    </span>
        <span th:classappend="${!hasPrevious} ? 'disabled'">
      <a th:if="${hasPrevious}"
         th:href="@{/courses(category=${category},status=${status},search=${search},page=${currentPage - 1},size=${pageSize},sort=${sort},direction=${direction})}">‹ Prev</a>
      <span th:unless="${hasPrevious}">‹ Prev</span>
    </span>
        <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/courses(category=${category},status=${status},search=${search},page=${i},size=${pageSize},sort=${sort},direction=${direction})}"
               th:classappend="${i == currentPage} ? 'active'"
               th:text="${i + 1}">1</a>
        </th:block>
        <span th:classappend="${!hasNext} ? 'disabled'">
      <a th:if="${hasNext}"
         th:href="@{/courses(category=${category},status=${status},search=${search},page=${currentPage + 1},size=${pageSize},sort=${sort},direction=${direction})}">Next ›</a>
      <span th:unless="${hasNext}">Next ›</span>
    </span>
        <span th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
      <a th:if="${currentPage != totalPages - 1}"
         th:href="@{/courses(category=${category},status=${status},search=${search},page=${totalPages - 1},size=${pageSize},sort=${sort},direction=${direction})}">Last »</a>
      <span th:if="${currentPage == totalPages - 1}">Last »</span>
    </span>
    </div>

</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
