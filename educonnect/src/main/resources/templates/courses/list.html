<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Courses')}"></head>

<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <!-- Page header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">All Courses</h2>
            <p class="text-muted small mt-1">
                Showing <span th:text="${courses.size()}">0</span> of
                <span th:text="${totalElements}">0</span> courses
                <span th:if="${totalPages > 1}">
          &nbsp;Â·&nbsp; Page
          <span th:text="${currentPage + 1}">1</span> of
          <span th:text="${totalPages}">1</span>
        </span>
            </p>
        </div>
        <a th:href="@{/courses/new}" class="btn btn-primary">
            <i class="bi bi-plus-circle me-1"></i>Add Course
        </a>
    </div>

    <!-- Flash success -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Search & Filter -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <form th:action="@{/courses}" method="get" class="row g-2 align-items-end">
                <div class="col-md-4">
                    <label class="form-label small fw-semibold">Search by Title</label>
                    <input type="text" name="search" class="form-control"
                           placeholder="e.g. Python, Calculusâ€¦"
                           th:value="${search}"/>
                </div>
                <div class="col-md-3">
                    <label class="form-label small fw-semibold">Category</label>
                    <select name="category" class="form-select">
                        <option value="">All Categories</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.name()}"
                                th:text="${cat.name().charAt(0) + cat.name().substring(1).toLowerCase()}"
                                th:selected="${cat.name() == category}">
                        </option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label class="form-label small fw-semibold">Status</label>
                    <select name="status" class="form-select">
                        <option value="">All Statuses</option>
                        <option th:each="st : ${statuses}"
                                th:value="${st.name()}"
                                th:text="${st.name().charAt(0) + st.name().substring(1).toLowerCase()}"
                                th:selected="${st.name() == status}">
                        </option>
                    </select>
                </div>
                <input type="hidden" name="sort"      th:value="${sort}"/>
                <input type="hidden" name="direction" th:value="${direction}"/>
                <input type="hidden" name="size"      th:value="${pageSize}"/>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="bi bi-search me-1"></i>Search
                    </button>
                    <a th:href="@{/courses}" class="btn btn-outline-secondary flex-fill">Clear</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Table -->
    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='courseCode',direction=${sort=='courseCode' and direction=='ASC'?'DESC':'ASC'})}" class="text-white text-decoration-none">Code <span th:if="${sort=='courseCode'}" th:text="${direction=='ASC'?'â†‘':'â†“'}"></span></a></th>
                    <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='title',direction=${sort=='title' and direction=='ASC'?'DESC':'ASC'})}" class="text-white text-decoration-none">Title <span th:if="${sort=='title'}" th:text="${direction=='ASC'?'â†‘':'â†“'}"></span></a></th>
                    <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='category',direction=${sort=='category' and direction=='ASC'?'DESC':'ASC'})}" class="text-white text-decoration-none">Category <span th:if="${sort=='category'}" th:text="${direction=='ASC'?'â†‘':'â†“'}"></span></a></th>
                    <th>Instructor</th>
                    <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='durationWeeks',direction=${sort=='durationWeeks' and direction=='ASC'?'DESC':'ASC'})}" class="text-white text-decoration-none">Duration <span th:if="${sort=='durationWeeks'}" th:text="${direction=='ASC'?'â†‘':'â†“'}"></span></a></th>
                    <th><a th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort='maxStudents',direction=${sort=='maxStudents' and direction=='ASC'?'DESC':'ASC'})}" class="text-white text-decoration-none">Seats <span th:if="${sort=='maxStudents'}" th:text="${direction=='ASC'?'â†‘':'â†“'}"></span></a></th>
                    <th>Status</th>
                    <th class="text-center">Actions</th>
                </tr>
                </thead>
                <tbody>

                <!-- Empty state -->
                <tr th:if="${courses.empty}">
                    <td colspan="8" class="text-center py-5 text-muted">
                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                        No courses found. <a th:href="@{/courses/new}">Add the first one!</a>
                    </td>
                </tr>

                <!-- Course rows -->
                <tr th:each="course : ${courses}">
                    <td><code th:text="${course.courseCode}">CODE</code></td>
                    <td>
                        <a th:href="@{/courses/{id}(id=${course.courseId})}"
                           class="fw-semibold text-decoration-none"
                           th:text="${course.title}">Title</a>
                    </td>
                    <td>
              <span class="badge"
                    th:classappend="${course.category.name() == 'MATHEMATICS'} ? 'bg-warning text-dark' :
                                     (${course.category.name() == 'BUSINESS'}  ? 'bg-info text-dark'    :
                                     (${course.category.name() == 'SCIENCE'}   ? 'bg-info text-dark'    :
                                     (${course.category.name() == 'LANGUAGE'}  ? 'bg-secondary'         :
                                     (${course.category.name() == 'ARTS'}      ? 'bg-danger'            : 'bg-primary'))))"
                    th:text="${course.category.name().charAt(0) + course.category.name().substring(1).toLowerCase()}">
              </span>
                    </td>
                    <td class="text-muted" th:text="${course.instructorName}">Instructor</td>
                    <td th:text="${course.durationWeeks + ' wks'}">12 wks</td>
                    <td th:text="${course.maxStudents}">50</td>
                    <td>
              <span class="badge"
                    th:classappend="${course.status.name() == 'ACTIVE'}      ? 'bg-success' :
                                     (${course.status.name() == 'DRAFT'}     ? 'bg-warning text-dark' :
                                     (${course.status.name() == 'COMPLETED'} ? 'bg-secondary' : 'bg-dark'))"
                    th:text="${course.status.name().charAt(0) + course.status.name().substring(1).toLowerCase()}">
              </span>
                    </td>
                    <td class="text-center">
                        <a th:href="@{/courses/{id}(id=${course.courseId})}"
                           class="btn btn-sm btn-outline-primary">
                            <i class="bi bi-eye"></i>
                        </a>
                    </td>
                </tr>

                </tbody>
            </table>
        </div>
    </div>

    <!-- Pagination -->
    <nav th:if="${totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link" th:href="@{/courses(category=${category},status=${status},search=${search},page=0,size=${pageSize},sort=${sort},direction=${direction})}">Â« First</a>
            </li>
            <li class="page-item" th:classappend="${!hasPrevious} ? 'disabled'">
                <a class="page-link" th:href="@{/courses(category=${category},status=${status},search=${search},page=${currentPage - 1},size=${pageSize},sort=${sort},direction=${direction})}">â€ą Prev</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link" th:text="${i + 1}"
                   th:href="@{/courses(category=${category},status=${status},search=${search},page=${i},size=${pageSize},sort=${sort},direction=${direction})}">1</a>
            </li>
            <li class="page-item" th:classappend="${!hasNext} ? 'disabled'">
                <a class="page-link" th:href="@{/courses(category=${category},status=${status},search=${search},page=${currentPage + 1},size=${pageSize},sort=${sort},direction=${direction})}">Next â€ş</a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link" th:href="@{/courses(category=${category},status=${status},search=${search},page=${totalPages - 1},size=${pageSize},sort=${sort},direction=${direction})}">Last Â»</a>
            </li>
        </ul>
    </nav>

</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
