<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">

        <!-- Brand -->
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-mortarboard-fill me-2"></i>EduConnect
        </a>

        <!-- Mobile toggler -->
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbarMain">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarMain">

            <!-- Nav links -->
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}"
                       th:classappend="${activePage == 'home'} ? ' active'">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/courses}"
                       th:classappend="${activePage == 'courses'} ? ' active'">Courses</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/about}"
                       th:classappend="${activePage == 'about'} ? ' active'">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/how-it-works}"
                       th:classappend="${activePage == 'how-it-works'} ? ' active'">How It Works</a>
                </li>

                <!-- My Courses → Student goes to /dashboard -->
                <li class="nav-item" sec:authorize="hasRole('STUDENT')">
                    <a class="nav-link" th:href="@{/dashboard}"
                       th:classappend="${activePage == 'dashboard'} ? ' active'">
                        <i class="bi bi-journal-check me-1"></i>My Courses
                    </a>
                </li>

                <!-- My Courses → Instructor goes to /instructor -->
                <li class="nav-item" sec:authorize="hasRole('INSTRUCTOR')">
                    <a class="nav-link" th:href="@{/instructor}"
                       th:classappend="${activePage == 'instructor'} ? ' active'">
                        <i class="bi bi-easel me-1"></i>My Courses
                    </a>
                </li>

                <!-- Admin link -->
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link text-warning fw-semibold" th:href="@{/admin}"
                       th:classappend="${activePage == 'admin'} ? ' active'">
                        <i class="bi bi-shield-fill me-1"></i>Admin
                    </a>
                </li>
            </ul>

            <!-- Right side -->
            <div class="d-flex align-items-center gap-2">

                <!-- Add Course — ADMIN + INSTRUCTOR only -->
                <a th:href="@{/courses/new}"
                   sec:authorize="hasAnyRole('ADMIN','INSTRUCTOR')"
                   class="btn btn-light btn-sm fw-semibold">
                    <i class="bi bi-plus-circle me-1"></i>Add Course
                </a>

                <!-- Logged in user dropdown -->
                <div class="dropdown" sec:authorize="isAuthenticated()">
                    <button class="btn btn-outline-light btn-sm dropdown-toggle"
                            type="button" data-bs-toggle="dropdown">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name">Username</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
              <span class="dropdown-item-text text-muted small">
                Logged in as <strong sec:authentication="name">Username</strong>
              </span>
                        </li>
                        <li><hr class="dropdown-divider"/></li>

                        <!-- Dashboard link in dropdown -->
                        <li sec:authorize="hasRole('STUDENT')">
                            <a class="dropdown-item" th:href="@{/dashboard}">
                                <i class="bi bi-journal-check me-2"></i>My Courses
                            </a>
                        </li>
                        <li sec:authorize="hasRole('INSTRUCTOR')">
                            <a class="dropdown-item" th:href="@{/instructor}">
                                <i class="bi bi-easel me-2"></i>My Courses
                            </a>
                        </li>
                        <li sec:authorize="hasRole('ADMIN')">
                            <a class="dropdown-item" th:href="@{/admin}">
                                <i class="bi bi-shield-fill me-2"></i>Admin Dashboard
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"/></li>
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger">
                                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>

                <!-- Not logged in -->
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn-outline-light btn-sm me-1">Login</a>
                    <a th:href="@{/register}" class="btn btn-light btn-sm fw-semibold">Register</a>
                </div>

            </div>
        </div>
    </div>
</nav>

</body>
</html>
