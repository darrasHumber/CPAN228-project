<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/head :: head('Course Students')}"></head>

<body>

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container py-4">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/instructor}">My Dashboard</a></li>
            <li class="breadcrumb-item active"
                th:text="${course.title}">Course</li>
        </ol>
    </nav>

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold mb-0">
                <i class="bi bi-people-fill text-primary me-2"></i>
                Enrolled Students
            </h2>
            <p class="text-muted small mt-1">
                <code th:text="${course.courseCode}">CODE</code>
                &nbsp;·&nbsp;
                <span th:text="${course.title}">Title</span>
            </p>
        </div>
        <div class="d-flex gap-2">
      <span class="badge bg-primary fs-6"
            th:text="${enrollments.size() + ' students'}">0 students</span>
            <a th:href="@{/instructor}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i>Back
            </a>
        </div>
    </div>

    <!-- Students table -->
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white fw-semibold">
            <i class="bi bi-table me-2"></i>Student List
        </div>

        <!-- Empty state -->
        <div th:if="${enrollments.empty}"
             class="card-body text-center py-5 text-muted">
            <i class="bi bi-people fs-1 d-block mb-3"></i>
            <p>No students enrolled in this course yet.</p>
        </div>

        <!-- Table -->
        <div class="table-responsive" th:unless="${enrollments.empty}">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-secondary">
                <tr>
                    <th>#</th>
                    <th>Student</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Status</th>
                    <th>Enrolled On</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="enrollment, i : ${enrollments}">
                    <td class="text-muted" th:text="${i.index + 1}">1</td>
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="bg-primary bg-opacity-10 rounded-circle d-flex
                            align-items-center justify-content-center fw-bold
                            text-primary"
                                 style="width:36px;height:36px;font-size:0.85rem"
                                 th:text="${enrollment.student.firstName.charAt(0) + '' + enrollment.student.lastName.charAt(0)}">
                                AB
                            </div>
                            <span class="fw-semibold"
                                  th:text="${enrollment.student.firstName + ' ' + enrollment.student.lastName}">
                  Name
                </span>
                        </div>
                    </td>
                    <td class="text-muted"
                        th:text="${enrollment.student.username}">username</td>
                    <td class="text-muted"
                        th:text="${enrollment.student.email}">email</td>
                    <td>
              <span class="badge"
                    th:classappend="${enrollment.status.name() == 'ACTIVE'}      ? 'bg-success'           :
                                     (${enrollment.status.name() == 'COMPLETED'} ? 'bg-warning text-dark' : 'bg-secondary')"
                    th:text="${enrollment.status.name().charAt(0) + enrollment.status.name().substring(1).toLowerCase()}">
              </span>
                    </td>
                    <td class="text-muted small"
                        th:text="${#temporals.format(enrollment.enrolledAt, 'MMM d, yyyy')}">
                        Jan 1, 2026
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<footer th:replace="~{fragments/footer :: footer}"></footer>
<th:block th:replace="~{fragments/footer :: scripts}"></th:block>
</body>
</html>
